<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Position Size Calculator v4</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0d1117; color:#c9d1d9; padding:20px; line-height:1.6; }
.container { max-width:1600px; margin:0 auto; }
h1 { text-align:center; margin-bottom:8px; color:#58a6ff; font-size:2em; }
.version { text-align:center; color:#8b949e; font-size:.85em; margin-bottom:20px; }
.global-risk { background:#161b22; border:2px solid #30363d; border-radius:12px; padding:20px; margin-bottom:20px; display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; }
.global-risk .field { text-align:center; }
.global-risk label { display:block; color:#58a6ff; font-size:.95em; font-weight:600; margin-bottom:6px; }
.global-risk input { width:100%; padding:10px; background:#0d1117; border:2px solid #30363d; border-radius:8px; color:#c9d1d9; font-size:1.1em; text-align:center; font-weight:bold; }
.global-risk input:focus { outline:none; border-color:#58a6ff; }
.margin-summary { background:#161b22; border:2px solid #30363d; border-radius:12px; padding:25px; margin-bottom:20px; }
.summary-header { text-align:center; margin-bottom:16px; padding-bottom:12px; border-bottom:2px solid #30363d; }
.summary-header h2 { color:#58a6ff; font-size:1.2em; margin:0; }
.summary-totals { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:16px; }
.total-column { background:#0d1117; padding:14px; border-radius:8px; border:1px solid #30363d; text-align:center; }
.total-label { color:#8b949e; font-size:.85em; margin-bottom:8px; }
.total-value { font-size:1.8em; font-weight:bold; color:#58a6ff; }
.total-value.warn { color:#f0ad4e; }
.total-value.bad { color:#f85149; }
.summary-breakdown { background:#0d1117; border-radius:8px; border:1px solid #30363d; overflow:hidden; }
.breakdown-table { width:100%; border-collapse:collapse; font-size:.9em; }
.breakdown-table thead { background:#161b22; }
.breakdown-table th, .breakdown-table td { padding:10px 14px; text-align:left; border-bottom:1px solid #30363d; }
.breakdown-table th { color:#8b949e; font-size:.8em; font-weight:600; }
.breakdown-table th:not(:first-child), .breakdown-table td:not(:first-child) { text-align:right; }
.breakdown-table tbody tr:last-child td { border-bottom:none; }
.breakdown-instrument { color:#58a6ff; font-weight:600; }
.breakdown-value { color:#58a6ff; font-weight:bold; }
.no-trades { padding:18px; text-align:center; color:#8b949e; }
.calculator-row { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:18px; margin-bottom:16px; }
.row-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; border-bottom:1px solid #30363d; padding-bottom:10px; }
.row-header h3 { color:#58a6ff; font-size:1.05em; margin:0; }
.row-header-right { display:flex; gap:10px; align-items:center; }
.broker-toggle-small { display:flex; gap:0; background:#0d1117; border-radius:6px; padding:3px; border:1px solid #30363d; }
.broker-btn-small { padding:5px 14px; background:transparent; border:none; color:#8b949e; cursor:pointer; font-size:.82em; border-radius:4px; transition:all .3s; }
.broker-btn-small.active { background:#238636; color:white; }
.clear-btn { padding:5px 14px; background:#3a1c1c; color:#f85149; border:1px solid #f8514955; border-radius:6px; cursor:pointer; font-size:.82em; transition:all .3s; font-weight:600; }
.clear-btn:hover { background:#f85149; color:white; }
.calculator-body { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.card { background:#0d1117; border:1px solid #30363d; border-radius:8px; padding:14px; }
.card h4 { color:#58a6ff; margin-bottom:12px; font-size:.95em; border-bottom:1px solid #30363d; padding-bottom:6px; }
.input-group { margin-bottom:10px; }
label { display:block; margin-bottom:4px; color:#8b949e; font-size:.82em; }
input, select { width:100%; padding:7px; background:#161b22; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; font-size:.88em; }
input:focus, select:focus { outline:none; border-color:#58a6ff; }
.price-input { font-size:1.2em; font-weight:bold; padding:10px; }
.entry-price { color:#f0ad4e; border-color:#f0ad4e; }
.stop-price { color:#f85149; border-color:#f85149; }
.limit-price { color:#3fb950; border-color:#3fb950; }
.toggle-group { display:flex; gap:6px; margin-bottom:10px; }
.toggle-btn { flex:1; padding:7px; background:#161b22; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; cursor:pointer; text-align:center; transition:all .3s; font-size:.82em; }
.toggle-btn.active { background:#238636; border-color:#238636; color:white; }
.toggle-btn.short.active { background:#da3633; border-color:#da3633; }
.results-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
.results-grid.full { grid-template-columns:1fr; }
.result-item { background:#161b22; padding:9px; border-radius:6px; border:1px solid #30363d; }
.result-label { color:#8b949e; font-size:.72em; margin-bottom:3px; }
.result-sublabel { color:#6e7681; font-size:.68em; margin-top:3px; }
.result-value { font-size:1.1em; font-weight:bold; color:#58a6ff; }
.result-value.positive { color:#3fb950; }
.result-value.negative { color:#f85149; }
.result-value.warn { color:#f0ad4e; }
.sanity-pane { margin-top:10px; padding:10px; background:#0d2c1f; border:1px solid #2ea043; border-radius:6px; font-size:.78em; line-height:1.5; }
.sanity-pane.warn { background:#2c1f0d; border-color:#f0ad4e; }
.sanity-pane.bad { background:#2c0d0d; border-color:#f85149; }
.sanity-pane .h { color:#3fb950; font-weight:600; text-transform:uppercase; letter-spacing:.5px; font-size:.75em; margin-bottom:5px; }
.sanity-pane.warn .h { color:#f0ad4e; }
.sanity-pane.bad .h { color:#f85149; }
.fx-rate-row { display:none; }
.fx-rate-row.show { display:block; }
.fx-rate-help { font-size:.7em; color:#8b949e; margin-top:3px; font-style:italic; }
.fx-rate-help.cross { color:#f0ad4e; }
@media (max-width:1200px) { .calculator-body { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="container">
<h1>Position Size Calculator</h1>
<div class="version">v4 — added CHF/JPY + NZD/CAD, prices persist on instrument change, per-trade Clear button</div>

<div class="global-risk">
  <div class="field">
    <label>Account Size ($)</label>
    <input type="number" id="acctSize" step="1000" value="150000">
  </div>
  <div class="field">
    <label>Risk Per Trade ($)</label>
    <input type="number" id="globalRisk" step="50" value="2250">
  </div>
  <div class="field">
    <label>Risk Per Trade (% of acct)</label>
    <input type="text" id="globalRiskPct" value="1.50%" readonly style="background:#0d1117;color:#58a6ff">
  </div>
  <div class="field">
    <label>Target % for Break Even</label>
    <input type="number" id="targetPercent" step="1" min="0" max="100" value="70">
  </div>
</div>

<div class="margin-summary">
  <div class="summary-header"><h2>Total Margin Required (across active trades)</h2></div>
  <div class="summary-totals">
    <div class="total-column"><div class="total-label">Intraday $</div><div class="total-value" id="summaryTotalID">$0</div></div>
    <div class="total-column"><div class="total-label">Intraday % of acct</div><div class="total-value" id="summaryTotalIDPct">0%</div></div>
    <div class="total-column"><div class="total-label">Overnight $</div><div class="total-value" id="summaryTotalON">$0</div></div>
    <div class="total-column"><div class="total-label">Overnight % of acct</div><div class="total-value" id="summaryTotalONPct">0%</div></div>
  </div>
  <div class="summary-breakdown" id="summaryBreakdown"><div class="no-trades">No active trades</div></div>
</div>

<div id="calculators"></div>
</div>

<script>
// =============================================================================
// INSTRUMENT DEFINITIONS
// FX spot: pip values computed dynamically from lot size
// FX cross pairs (no USD on either side): require explicit USD/quote rate input
// =============================================================================
var instrumentsNinja={
  // Index futures
  MES:{tickSize:0.25,tickValue:1.25,marginID:50,marginON:1166,isFutures:true,assetClass:'index'},
  ES:{tickSize:0.25,tickValue:12.50,marginID:500,marginON:11660,isFutures:true,assetClass:'index'},
  MNQ:{tickSize:0.25,tickValue:0.50,marginID:100,marginON:1738,isFutures:true,assetClass:'index'},
  NQ:{tickSize:0.25,tickValue:5.00,marginID:1000,marginON:17380,isFutures:true,assetClass:'index'},
  // Metals & energy
  MGC:{tickSize:0.10,tickValue:1.00,marginID:200,marginON:814,isFutures:true,assetClass:'commodity'},
  GC:{tickSize:0.10,tickValue:10.00,marginID:2000,marginON:8140,isFutures:true,assetClass:'commodity'},
  MCL:{tickSize:0.01,tickValue:1.00,marginID:100,marginON:726,isFutures:true,assetClass:'commodity'},
  CL:{tickSize:0.01,tickValue:10.00,marginID:2000,marginON:7260,isFutures:true,assetClass:'commodity'},
  SIL:{tickSize:0.005,tickValue:5.00,marginID:440,marginON:4400,isFutures:true,assetClass:'commodity'},
  SI:{tickSize:0.005,tickValue:25.00,marginID:2200,marginON:22000,isFutures:true,assetClass:'commodity'},
  MBT:{tickSize:5,tickValue:0.50,marginID:200,marginON:2000,isFutures:true,assetClass:'crypto'},
  // Grains
  ZC:{tickSize:0.0025,tickValue:12.50,marginID:250,marginON:2475,isFutures:true,assetClass:'grain'},
  ZW:{tickSize:0.0025,tickValue:12.50,marginID:200,marginON:2000,isFutures:true,assetClass:'grain'},
  ZS:{tickSize:0.0025,tickValue:12.50,marginID:250,marginON:2475,isFutures:true,assetClass:'grain'},
  // Rates
  ZT:{tickSize:0.0078125,tickValue:15.625,marginID:500,marginON:1540,isFutures:true,assetClass:'rates'},
  ZN:{tickSize:0.015625,tickValue:15.625,marginID:500,marginON:2475,isFutures:true,assetClass:'rates'},
  ZB:{tickSize:0.03125,tickValue:31.25,marginID:1000,marginON:4620,isFutures:true,assetClass:'rates'},
  // FX FUTURES
  M6A:{tickSize:0.0001,tickValue:1.00,marginID:50,marginON:220,isFutures:true,assetClass:'fxfut',contractSize:10000,base:'AUD',quote:'USD'},
  A6:{tickSize:0.0001,tickValue:10.00,marginID:500,marginON:2200,isFutures:true,assetClass:'fxfut',contractSize:100000,base:'AUD',quote:'USD'},
  M6E:{tickSize:0.0001,tickValue:1.25,marginID:50,marginON:292,isFutures:true,assetClass:'fxfut',contractSize:12500,base:'EUR',quote:'USD'},
  E6:{tickSize:0.0001,tickValue:12.50,marginID:500,marginON:2915,isFutures:true,assetClass:'fxfut',contractSize:125000,base:'EUR',quote:'USD'},
  M6B:{tickSize:0.0001,tickValue:0.625,marginID:50,marginON:308,isFutures:true,assetClass:'fxfut',contractSize:6250,base:'GBP',quote:'USD'},
  B6:{tickSize:0.0001,tickValue:6.25,marginID:500,marginON:3080,isFutures:true,assetClass:'fxfut',contractSize:62500,base:'GBP',quote:'USD'},
  MICD:{tickSize:0.0001,tickValue:1.00,marginID:50,marginON:152,isFutures:true,assetClass:'fxfut',contractSize:10000,base:'CAD',quote:'USD'},
  C6:{tickSize:0.0001,tickValue:10.00,marginID:500,marginON:1518,isFutures:true,assetClass:'fxfut',contractSize:100000,base:'CAD',quote:'USD'},
  S6:{tickSize:0.0001,tickValue:12.50,marginID:500,marginON:4950,isFutures:true,assetClass:'fxfut',contractSize:125000,base:'CHF',quote:'USD'},
  J6:{tickSize:0.0000005,tickValue:6.25,marginID:500,marginON:4092,isFutures:true,assetClass:'fxfut',contractSize:12500000,base:'JPY',quote:'USD'},
  // FX SPOT — base + quote tracked for cross-pair detection
  AUDUSD:{isFutures:false,assetClass:'fxspot',pipSize:0.0001,base:'AUD',quote:'USD',marginPctIntra:0.05,marginPctNight:0.05},
  EURUSD:{isFutures:false,assetClass:'fxspot',pipSize:0.0001,base:'EUR',quote:'USD',marginPctIntra:0.05,marginPctNight:0.05},
  GBPUSD:{isFutures:false,assetClass:'fxspot',pipSize:0.0001,base:'GBP',quote:'USD',marginPctIntra:0.05,marginPctNight:0.05},
  NZDUSD:{isFutures:false,assetClass:'fxspot',pipSize:0.0001,base:'NZD',quote:'USD',marginPctIntra:0.05,marginPctNight:0.05},
  USDCAD:{isFutures:false,assetClass:'fxspot',pipSize:0.0001,base:'USD',quote:'CAD',marginPctIntra:0.05,marginPctNight:0.05},
  USDCHF:{isFutures:false,assetClass:'fxspot',pipSize:0.0001,base:'USD',quote:'CHF',marginPctIntra:0.05,marginPctNight:0.05},
  USDJPY:{isFutures:false,assetClass:'fxspot',pipSize:0.01,base:'USD',quote:'JPY',marginPctIntra:0.05,marginPctNight:0.05},
  EURJPY:{isFutures:false,assetClass:'fxspot',pipSize:0.01,base:'EUR',quote:'JPY',marginPctIntra:0.05,marginPctNight:0.05},
  GBPJPY:{isFutures:false,assetClass:'fxspot',pipSize:0.01,base:'GBP',quote:'JPY',marginPctIntra:0.05,marginPctNight:0.05},
  CHFJPY:{isFutures:false,assetClass:'fxspot',pipSize:0.01,base:'CHF',quote:'JPY',marginPctIntra:0.05,marginPctNight:0.05},
  NZDCAD:{isFutures:false,assetClass:'fxspot',pipSize:0.0001,base:'NZD',quote:'CAD',marginPctIntra:0.05,marginPctNight:0.05}
};

var tosOverrides={
  MES:{marginID:2465,marginON:2465}, ES:{marginID:24650,marginON:24650},
  MNQ:{marginID:3692,marginON:3692}, NQ:{marginID:36918,marginON:36918},
  MGC:{marginID:2618,marginON:2618}, GC:{marginID:25650,marginON:25650},
  MCL:{marginID:457,marginON:457}, CL:{marginID:4754,marginON:4754},
  SIL:{marginID:4400,marginON:4400}, SI:{marginID:22000,marginON:22000},
  MBT:{marginID:2000,marginON:2000},
  ZC:{marginID:2475,marginON:2475}, ZW:{marginID:2000,marginON:2000}, ZS:{marginID:2475,marginON:2475},
  ZT:{marginID:1540,marginON:1540}, ZN:{marginID:2475,marginON:2475}, ZB:{marginID:4620,marginON:4620},
  M6A:{marginID:209,marginON:209}, A6:{marginID:2090,marginON:2090},
  M6E:{marginID:297,marginON:297}, E6:{marginID:2970,marginON:2970},
  M6B:{marginID:220,marginON:220}, B6:{marginID:2200,marginON:2200},
  MICD:{marginID:110,marginON:110}, C6:{marginID:1100,marginON:1100},
  S6:{marginID:4950,marginON:4950}, J6:{marginID:3080,marginON:3080}
};

function getInstrument(key, broker) {
  var base = instrumentsNinja[key];
  if (!base) return null;
  var inst = Object.assign({}, base);
  if (broker === 'tos' && tosOverrides[key]) {
    inst.marginID = tosOverrides[key].marginID;
    inst.marginON = tosOverrides[key].marginON;
  }
  return inst;
}

var calculators=[];

var instrumentOptions = '<optgroup label="Index Futures">' +
  '<option value="MES">MES — Micro E-mini S&P 500</option>' +
  '<option value="ES">ES — E-mini S&P 500</option>' +
  '<option value="MNQ">MNQ — Micro E-mini Nasdaq-100</option>' +
  '<option value="NQ">NQ — E-mini Nasdaq-100</option>' +
  '</optgroup>' +
  '<optgroup label="Metals / Energy / Crypto">' +
  '<option value="MGC">MGC — Micro Gold</option>' +
  '<option value="GC">GC — Gold</option>' +
  '<option value="SIL">SIL — Micro Silver</option>' +
  '<option value="SI">SI — Silver</option>' +
  '<option value="MCL">MCL — Micro Crude Oil</option>' +
  '<option value="CL">CL — Crude Oil</option>' +
  '<option value="MBT">MBT — Micro Bitcoin</option>' +
  '</optgroup>' +
  '<optgroup label="Grains">' +
  '<option value="ZC">ZC — Corn</option>' +
  '<option value="ZW">ZW — Wheat</option>' +
  '<option value="ZS">ZS — Soybeans</option>' +
  '</optgroup>' +
  '<optgroup label="Rates / Bonds">' +
  '<option value="ZT">ZT — 2Y Treasury Note</option>' +
  '<option value="ZN">ZN — 10Y Treasury Note</option>' +
  '<option value="ZB">ZB — 30Y Treasury Bond</option>' +
  '</optgroup>' +
  '<optgroup label="FX Spot — USD-quote majors">' +
  '<option value="AUDUSD">AUD/USD spot</option>' +
  '<option value="EURUSD">EUR/USD spot</option>' +
  '<option value="GBPUSD">GBP/USD spot</option>' +
  '<option value="NZDUSD">NZD/USD spot</option>' +
  '</optgroup>' +
  '<optgroup label="FX Spot — USD-base inverted">' +
  '<option value="USDCAD">USD/CAD spot</option>' +
  '<option value="USDCHF">USD/CHF spot</option>' +
  '<option value="USDJPY">USD/JPY spot</option>' +
  '</optgroup>' +
  '<optgroup label="FX Spot — Crosses (require USD/quote rate)">' +
  '<option value="EURJPY">EUR/JPY spot</option>' +
  '<option value="GBPJPY">GBP/JPY spot</option>' +
  '<option value="CHFJPY">CHF/JPY spot</option>' +
  '<option value="NZDCAD">NZD/CAD spot</option>' +
  '</optgroup>' +
  '<optgroup label="FX Futures (fixed contract size)">' +
  '<option value="M6A">M6A — Micro AUD futures</option>' +
  '<option value="A6">6A — AUD futures</option>' +
  '<option value="M6E">M6E — Micro EUR futures</option>' +
  '<option value="E6">6E — EUR FX futures</option>' +
  '<option value="M6B">M6B — Micro GBP futures</option>' +
  '<option value="B6">6B — British Pound futures</option>' +
  '<option value="MICD">MICD — Micro CAD futures</option>' +
  '<option value="C6">6C — Canadian Dollar futures</option>' +
  '<option value="S6">6S — Swiss Franc futures</option>' +
  '<option value="J6">6J — Japanese Yen futures</option>' +
  '</optgroup>';

// Helpers
function getAcctSize() { return parseFloat(document.getElementById('acctSize').value) || 0; }
function getGlobalRisk() { return parseFloat(document.getElementById('globalRisk').value) || 0; }

function updateRiskPctDisplay() {
  var acct = getAcctSize();
  var risk = getGlobalRisk();
  var pct = acct > 0 ? (risk / acct * 100) : 0;
  document.getElementById('globalRiskPct').value = pct.toFixed(2) + '%';
}

function saveState(i) {
  var s = {
    instrument: document.getElementById('instrument'+i).value,
    direction: calculators[i-1].direction,
    broker: calculators[i-1].broker,
    entry: document.getElementById('entryPrice'+i).value,
    stop: document.getElementById('stopPrice'+i).value,
    limit: document.getElementById('limitPrice'+i).value,
    lotSize: document.getElementById('lotSize'+i) ? document.getElementById('lotSize'+i).value : '',
    customLot: document.getElementById('customLot'+i) ? document.getElementById('customLot'+i).value : '',
    fxRate: document.getElementById('fxRate'+i) ? document.getElementById('fxRate'+i).value : ''
  };
  localStorage.setItem('tradeV4_'+i, JSON.stringify(s));
}
function loadState(i) {
  var s = localStorage.getItem('tradeV4_'+i);
  if (s) { try { return JSON.parse(s); } catch(e) { return null; } }
  return null;
}
function saveGlobals() {
  localStorage.setItem('acctSizeV4', document.getElementById('acctSize').value);
  localStorage.setItem('globalRiskV4', document.getElementById('globalRisk').value);
  localStorage.setItem('targetPercentV4', document.getElementById('targetPercent').value);
}
function loadGlobals() {
  var a = localStorage.getItem('acctSizeV4'); if (a) document.getElementById('acctSize').value = a;
  var r = localStorage.getItem('globalRiskV4'); if (r) document.getElementById('globalRisk').value = r;
  var p = localStorage.getItem('targetPercentV4'); if (p) document.getElementById('targetPercent').value = p;
}

document.getElementById('acctSize').addEventListener('input', function() {
  saveGlobals(); updateRiskPctDisplay(); calculators.forEach(function(c){ c.calculate(); });
});
document.getElementById('globalRisk').addEventListener('input', function() {
  saveGlobals(); updateRiskPctDisplay(); calculators.forEach(function(c){ c.calculate(); });
});
document.getElementById('targetPercent').addEventListener('input', function() {
  saveGlobals(); calculators.forEach(function(c){ c.calculate(); });
});

function updateSummary() {
  var bd = {}, tID = 0, tON = 0;
  for (var x = 0; x < calculators.length; x++) {
    var c = calculators[x];
    var r = c.lastResult;
    if (!r || !r.contracts || r.contracts === 0) continue;
    var k = c.lastResult.symbol + ' (' + r.contracts + (r.isSpotFX ? ' lots' : '') + ')';
    bd[k] = { id: r.marginID, on: r.marginON };
    tID += r.marginID;
    tON += r.marginON;
  }
  var acct = getAcctSize();
  document.getElementById('summaryTotalID').textContent = '$' + Math.round(tID).toLocaleString();
  document.getElementById('summaryTotalON').textContent = '$' + Math.round(tON).toLocaleString();
  var idPct = acct > 0 ? (tID / acct * 100) : 0;
  var onPct = acct > 0 ? (tON / acct * 100) : 0;
  var idEl = document.getElementById('summaryTotalIDPct');
  var onEl = document.getElementById('summaryTotalONPct');
  idEl.textContent = idPct.toFixed(1) + '%';
  onEl.textContent = onPct.toFixed(1) + '%';
  idEl.className = 'total-value' + (idPct >= 80 ? ' bad' : (idPct >= 50 ? ' warn' : ''));
  onEl.className = 'total-value' + (onPct >= 80 ? ' bad' : (onPct >= 50 ? ' warn' : ''));
  var bdDiv = document.getElementById('summaryBreakdown');
  var ks = Object.keys(bd);
  if (ks.length === 0) {
    bdDiv.innerHTML = '<div class="no-trades">No active trades</div>';
  } else {
    var h = '<table class="breakdown-table"><thead><tr><th>Instrument</th><th>Intraday $</th><th>Intraday %</th><th>Overnight $</th><th>Overnight %</th></tr></thead><tbody>';
    for (var j = 0; j < ks.length; j++) {
      var idP = acct > 0 ? (bd[ks[j]].id / acct * 100) : 0;
      var onP = acct > 0 ? (bd[ks[j]].on / acct * 100) : 0;
      h += '<tr><td class="breakdown-instrument">' + ks[j] + '</td>' +
           '<td class="breakdown-value">$' + Math.round(bd[ks[j]].id).toLocaleString() + '</td>' +
           '<td>' + idP.toFixed(1) + '%</td>' +
           '<td class="breakdown-value">$' + Math.round(bd[ks[j]].on).toLocaleString() + '</td>' +
           '<td>' + onP.toFixed(1) + '%</td></tr>';
    }
    h += '</tbody></table>';
    bdDiv.innerHTML = h;
  }
}

function createCalc(i) {
  return {
    index: i, direction: 'long', broker: 'ninja', lastResult: null,
    calculate: function() {
      var ik = document.getElementById('instrument'+i).value;
      var ins = getInstrument(ik, this.broker);
      if (!ins) { this.clearResults(); return; }

      var en = parseFloat(document.getElementById('entryPrice'+i).value) || 0;
      var st = parseFloat(document.getElementById('stopPrice'+i).value) || 0;
      var li = parseFloat(document.getElementById('limitPrice'+i).value) || 0;
      var rpt = getGlobalRisk();
      var tp = parseFloat(document.getElementById('targetPercent').value) || 70;
      var acct = getAcctSize();

      // Detect cross pair (no USD on either side)
      var isCross = ins.assetClass === 'fxspot' && ins.base !== 'USD' && ins.quote !== 'USD';
      var isUSDBase = ins.assetClass === 'fxspot' && ins.base === 'USD' && ins.quote !== 'USD';

      // Show/hide lot-size and FX-rate inputs based on instrument type
      var lotRow = document.getElementById('lotSizeRow'+i);
      var fxRateRow = document.getElementById('fxRateRow'+i);
      var fxRateLabel = document.getElementById('fxRateLabel'+i);
      var fxRateHelp = document.getElementById('fxRateHelp'+i);
      if (ins.assetClass === 'fxspot') {
        lotRow.style.display = '';
        if (ins.quote === 'USD') {
          fxRateRow.style.display = 'none';
        } else {
          fxRateRow.style.display = '';
          if (isCross) {
            fxRateLabel.textContent = 'Current USD/' + ins.quote + ' rate (REQUIRED for cross pair)';
            fxRateHelp.textContent = 'Cross pair: enter the current USD/' + ins.quote + ' rate so pip value can be converted to USD. Entry price will NOT be used as fallback.';
            fxRateHelp.className = 'fx-rate-help cross';
            document.getElementById('fxRate'+i).placeholder = 'e.g., 150.00 for USD/JPY pairs';
          } else {
            fxRateLabel.textContent = 'Current USD/' + ins.quote + ' rate (optional)';
            fxRateHelp.textContent = 'For USD-base pairs, the entry price IS the USD/' + ins.quote + ' rate. Leaving this blank uses entry as the rate.';
            fxRateHelp.className = 'fx-rate-help';
            document.getElementById('fxRate'+i).placeholder = 'leave blank to use entry price';
          }
        }
      } else {
        lotRow.style.display = 'none';
        fxRateRow.style.display = 'none';
      }

      this.clearDisplayOnly();
      if (!en || !st || !li || !rpt) { this.clearResults(); return; }

      // === Compute pip/tick value per contract or lot ===
      var tickSize, tickValue, marginID, marginON, contractSize, isSpotFX = false, lotSizeUsed = 0;

      if (ins.assetClass === 'fxspot') {
        isSpotFX = true;
        var lotChoice = document.getElementById('lotSize'+i).value;
        if (lotChoice === 'custom') {
          lotSizeUsed = parseFloat(document.getElementById('customLot'+i).value) || 0;
        } else {
          lotSizeUsed = parseFloat(lotChoice);
        }
        if (lotSizeUsed <= 0) { this.clearResults(); return; }

        tickSize = ins.pipSize;
        if (ins.quote === 'USD') {
          tickValue = lotSizeUsed * ins.pipSize; // 10000 × 0.0001 = $1
        } else {
          var fxRate = parseFloat(document.getElementById('fxRate'+i).value) || 0;
          if (fxRate <= 0) {
            if (isCross) {
              // For crosses, must require explicit fxRate — don't fall back to entry
              this.clearResults();
              this.setSanity('bad', 'Missing USD/' + ins.quote + ' rate', 'Cross pair (' + ins.base + '/' + ins.quote + ') requires explicit USD/' + ins.quote + ' rate. Entry price is NOT a substitute. Enter the current rate above to compute pip value correctly.');
              return;
            } else {
              // USD-base pair: entry = USD/quote rate is fine
              fxRate = en;
            }
          }
          tickValue = (lotSizeUsed * ins.pipSize) / fxRate;
        }
        var notional = lotSizeUsed * en;
        marginID = notional * ins.marginPctIntra;
        marginON = notional * ins.marginPctNight;
      } else {
        tickSize = ins.tickSize;
        tickValue = ins.tickValue;
        marginID = ins.marginID;
        marginON = ins.marginON;
        contractSize = ins.contractSize || null;
      }

      // === Compute points / ticks / risk per unit ===
      var ptsS, ptsL;
      if (this.direction === 'long') { ptsS = en - st; ptsL = li - en; }
      else { ptsS = st - en; ptsL = en - li; }
      if (ptsS <= 0 || ptsL <= 0) { this.clearResults(); return; }

      var tksS = Math.round(ptsS / tickSize);
      var tksL = Math.round(ptsL / tickSize);
      var rpc = tksS * tickValue;
      var rwc = tksL * tickValue;
      var rr = rpc > 0 ? (rwc / rpc) : 0;
      var con = rpc > 0 ? Math.floor(rpt / rpc) : 0;
      if (con < 1 && rpc > 0 && rpc <= rpt) con = 1;
      var tR = con * rpc;
      var tRw = con * rwc;
      var totalMarginID = con * marginID;
      var totalMarginON = con * marginON;
      var notionalTotal = isSpotFX ? (con * lotSizeUsed * en) : (contractSize ? con * contractSize * en : null);

      var tgtP;
      if (this.direction === 'long') tgtP = en + (ptsL * tp / 100);
      else tgtP = en - (ptsL * tp / 100);

      var stopPct = (ptsS / en) * 100;
      var leverageImplied = (acct > 0 && tR > 0) ? (notionalTotal ? (notionalTotal / acct) : null) : null;

      // === Render ===
      document.getElementById('points'+i).textContent = ptsS.toFixed(ins.assetClass === 'fxspot' && ins.pipSize === 0.0001 ? 5 : (ins.tickSize && ins.tickSize < 0.01 ? 5 : 4));
      document.getElementById('rrRatio'+i).textContent = rr.toFixed(2) + ':1';
      document.getElementById('ticksRisk'+i).textContent = tksS.toFixed(0);
      document.getElementById('ticksReward'+i).textContent = tksL.toFixed(0);
      document.getElementById('risk'+i).textContent = '-$' + tR.toFixed(0);
      document.getElementById('reward'+i).textContent = '$' + tRw.toFixed(0);
      document.getElementById('contracts'+i).textContent = con + (isSpotFX ? ' lots' : '');
      document.getElementById('targetPct'+i).textContent = tgtP.toFixed(ik.indexOf('JPY') >= 0 ? 3 : (ins.tickSize && ins.tickSize < 0.001 ? 5 : 4));
      document.getElementById('marginID'+i).textContent = '$' + Math.round(totalMarginID).toLocaleString();
      document.getElementById('marginON'+i).textContent = '$' + Math.round(totalMarginON).toLocaleString();
      var perUnit = isSpotFX ? ('$' + (marginID).toFixed(0) + ' /' + lotSizeUsed.toLocaleString() + '-unit lot') : ('$' + marginID.toLocaleString() + ' /contract');
      document.getElementById('marginIDPerContract'+i).textContent = perUnit;
      document.getElementById('marginONPerContract'+i).textContent = isSpotFX ? ('$' + (marginON).toFixed(0) + ' /' + lotSizeUsed.toLocaleString() + '-unit lot') : ('$' + marginON.toLocaleString() + ' /contract');

      document.getElementById('notional'+i).textContent = notionalTotal != null ? ('$' + Math.round(notionalTotal).toLocaleString()) : '—';
      document.getElementById('leverage'+i).textContent = (leverageImplied != null && leverageImplied > 0) ? (leverageImplied.toFixed(1) + 'x') : '—';
      document.getElementById('stopPct'+i).textContent = stopPct.toFixed(3) + '%';
      var idAcctPct = acct > 0 ? (totalMarginID / acct * 100) : 0;
      var onAcctPct = acct > 0 ? (totalMarginON / acct * 100) : 0;
      document.getElementById('marginIDPct'+i).textContent = idAcctPct.toFixed(1) + '%';
      document.getElementById('marginONPct'+i).textContent = onAcctPct.toFixed(1) + '%';

      var pipDisplay;
      if (isSpotFX) {
        pipDisplay = '$' + tickValue.toFixed(4) + ' per pip per ' + lotSizeUsed.toLocaleString() + '-unit lot' +
          (ins.quote !== 'USD' ? ' (rate: ' + (parseFloat(document.getElementById('fxRate'+i).value) || en).toFixed(4) + ')' : '');
      } else {
        pipDisplay = '$' + tickValue.toFixed(4) + ' per tick per contract';
      }
      document.getElementById('pipValueShown'+i).textContent = pipDisplay;

      // === Sanity ===
      var sanityClass = '', sanityH = 'Sanity OK', sanityMsg = '';
      var riskDelta = Math.abs(tR - rpt);
      var riskDeltaPct = rpt > 0 ? (riskDelta / rpt * 100) : 0;
      if (riskDeltaPct > 25) {
        sanityClass = 'warn'; sanityH = 'Risk mismatch';
        sanityMsg = 'Computed risk is ' + (tR < rpt ? 'BELOW' : 'ABOVE') + ' your $' + rpt.toLocaleString() + ' target by ' + riskDeltaPct.toFixed(0) + '%. Stop is too tight to size up to a full unit, or contract risk exceeds budget.';
      }
      if (onAcctPct > 80) {
        sanityClass = 'bad'; sanityH = 'Margin overload';
        sanityMsg = 'Overnight margin alone is ' + onAcctPct.toFixed(0) + '% of account on this single trade. No room for additional concurrent positions.';
      }
      if (leverageImplied != null && leverageImplied > 30) {
        sanityClass = sanityClass || 'warn'; sanityH = 'High leverage';
        sanityMsg = (sanityMsg ? sanityMsg + ' ' : '') + 'Implied leverage is ' + leverageImplied.toFixed(0) + 'x — confirm stop is at a real structural level, not noise.';
      }
      this.setSanity(sanityClass, sanityH, sanityMsg || ('Risk computed at $' + tR.toFixed(0) + ' (' + (acct > 0 ? (tR/acct*100).toFixed(2) : '0') + '% of account).'));

      this.lastResult = {
        symbol: ik, contracts: con, marginID: totalMarginID, marginON: totalMarginON,
        isSpotFX: isSpotFX, notional: notionalTotal
      };
      updateSummary();
    },
    setSanity: function(cls, h, msg) {
      var i = this.index;
      document.getElementById('sanity'+i).className = 'sanity-pane' + (cls ? ' ' + cls : '');
      document.getElementById('sanityH'+i).textContent = h;
      document.getElementById('sanityMsg'+i).textContent = msg;
    },
    clearDisplayOnly: function() {},
    clearResults: function() {
      ['points','rrRatio','ticksRisk','ticksReward','risk','reward','contracts','targetPct',
       'marginID','marginON','notional','leverage','stopPct','marginIDPct','marginONPct'].forEach(function(f){
        var el = document.getElementById(f+this.index); if (el) el.textContent = '-';
      }.bind(this));
      var pv = document.getElementById('pipValueShown'+this.index); if (pv) pv.textContent = '-';
      this.setSanity('', 'Awaiting inputs', 'Enter entry, stop, target, and risk size to see sanity checks.');
      this.lastResult = null;
      updateSummary();
    },
    clearPrices: function() {
      document.getElementById('entryPrice'+this.index).value = '';
      document.getElementById('stopPrice'+this.index).value = '';
      document.getElementById('limitPrice'+this.index).value = '';
      saveState(this.index);
      this.calculate();
    }
  };
}

function reorderPrices(i, dir) {
  var c = document.getElementById('priceInputs'+i);
  var lim = c.querySelector('#limitPrice'+i).parentElement;
  var ent = c.querySelector('#entryPrice'+i).parentElement;
  var stp = c.querySelector('#stopPrice'+i).parentElement;
  c.innerHTML = '';
  if (dir === 'long') { c.appendChild(lim); c.appendChild(ent); c.appendChild(stp); }
  else { c.appendChild(stp); c.appendChild(ent); c.appendChild(lim); }
}

function renderCalcs() {
  var cont = document.getElementById('calculators');
  for (var i = 1; i <= 6; i++) {
    var calc = createCalc(i);
    calculators.push(calc);
    var row = document.createElement('div');
    row.className = 'calculator-row';
    row.innerHTML = buildHTML(i);
    cont.appendChild(row);
    (function(calc, i) {
      var st = loadState(i);
      if (st) {
        document.getElementById('instrument'+i).value = st.instrument;
        calc.direction = st.direction; calc.broker = st.broker;
        document.getElementById('entryPrice'+i).value = st.entry;
        document.getElementById('stopPrice'+i).value = st.stop;
        document.getElementById('limitPrice'+i).value = st.limit;
        if (st.lotSize) document.getElementById('lotSize'+i).value = st.lotSize;
        if (st.customLot) document.getElementById('customLot'+i).value = st.customLot;
        if (st.fxRate) document.getElementById('fxRate'+i).value = st.fxRate;
        if (st.direction === 'short') {
          document.getElementById('shortBtn'+i).classList.add('active');
          document.getElementById('longBtn'+i).classList.remove('active');
          reorderPrices(i, 'short');
        }
        if (st.broker === 'tos') {
          document.getElementById('tosBtn'+i).classList.add('active');
          document.getElementById('ninjaBtn'+i).classList.remove('active');
        }
      }
      document.getElementById('ninjaBtn'+i).addEventListener('click', function() {
        calc.broker = 'ninja'; this.classList.add('active');
        document.getElementById('tosBtn'+i).classList.remove('active');
        saveState(i); calc.calculate();
      });
      document.getElementById('tosBtn'+i).addEventListener('click', function() {
        calc.broker = 'tos'; this.classList.add('active');
        document.getElementById('ninjaBtn'+i).classList.remove('active');
        saveState(i); calc.calculate();
      });
      document.getElementById('longBtn'+i).addEventListener('click', function() {
        calc.direction = 'long'; this.classList.add('active');
        document.getElementById('shortBtn'+i).classList.remove('active');
        reorderPrices(i, 'long'); saveState(i); calc.calculate();
      });
      document.getElementById('shortBtn'+i).addEventListener('click', function() {
        calc.direction = 'short'; this.classList.add('active');
        document.getElementById('longBtn'+i).classList.remove('active');
        reorderPrices(i, 'short'); saveState(i); calc.calculate();
      });
      // CHANGED in v4: prices PERSIST when changing instruments (no clearing)
      document.getElementById('instrument'+i).addEventListener('change', function() {
        saveState(i); calc.calculate();
      });
      // NEW in v4: explicit Clear Prices button
      document.getElementById('clearBtn'+i).addEventListener('click', function() {
        calc.clearPrices();
      });
      document.getElementById('entryPrice'+i).addEventListener('input', function() { saveState(i); calc.calculate(); });
      document.getElementById('stopPrice'+i).addEventListener('input', function() { saveState(i); calc.calculate(); });
      document.getElementById('limitPrice'+i).addEventListener('input', function() { saveState(i); calc.calculate(); });
      document.getElementById('lotSize'+i).addEventListener('change', function() {
        document.getElementById('customLot'+i).style.display = (this.value === 'custom') ? '' : 'none';
        saveState(i); calc.calculate();
      });
      document.getElementById('customLot'+i).addEventListener('input', function() { saveState(i); calc.calculate(); });
      document.getElementById('fxRate'+i).addEventListener('input', function() { saveState(i); calc.calculate(); });
    })(calc, i);
    calc.calculate();
  }
}

loadGlobals();
updateRiskPctDisplay();
renderCalcs();
</script>
